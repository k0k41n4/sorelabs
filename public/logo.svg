<svg width="150" height="28" viewBox="0 0 150 28" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .text { font: bold 20px 'Outfit', sans-serif; fill: white; }
    .sun-accent { fill: #FF8C00; }
  </style>
  
  <text x="2" y="22" class="text">S</text>
  
  <g transform="translate(18, 2)">
    <!-- Sun Core -->
    <circle cx="12" cy="12" r="4.8" class="sun-accent" />
    <!-- Subtle Inner Ring -->
    <circle cx="12" cy="12" r="3" fill="none" stroke="black" stroke-opacity="0.2" stroke-width="0.5" />
    <!-- 12 Thin Rays -->
    <rect x="11.6" y="1" width="0.8" height="4.5" rx="0.4" class="sun-accent" transform="rotate(0 12 12)" />
    <rect x="11.6" y="1" width="0.8" height="4.5" rx="0.4" class="sun-accent" transform="rotate(30 12 12)" />
    <rect x="11.6" y="1" width="0.8" height="4.5" rx="0.4" class="sun-accent" transform="rotate(60 12 12)" />
    <rect x="11.6" y="1" width="0.8" height="4.5" rx="0.4" class="sun-accent" transform="rotate(90 12 12)" />
    <rect x="11.6" y="1" width="0.8" height="4.5" rx="0.4" class="sun-accent" transform="rotate(120 12 12)" />
    <rect x="11.6" y="1" width="0.8" height="4.5" rx="0.4" class="sun-accent" transform="rotate(150 12 12)" />
    <rect x="11.6" y="1" width="0.8" height="4.5" rx="0.4" class="sun-accent" transform="rotate(180 12 12)" />
    <rect x="11.6" y="1" width="0.8" height="4.5" rx="0.4" class="sun-accent" transform="rotate(210 12 12)" />
    <rect x="11.6" y="1" width="0.8" height="4.5" rx="0.4" class="sun-accent" transform="rotate(240 12 12)" />
    <rect x="11.6" y="1" width="0.8" height="4.5" rx="0.4" class="sun-accent" transform="rotate(270 12 12)" />
    <rect x="11.6" y="1" width="0.8" height="4.5" rx="0.4" class="sun-accent" transform="rotate(300 12 12)" />
    <rect x="11.6" y="1" width="0.8" height="4.5" rx="0.4" class="sun-accent" transform="rotate(330 12 12)" />
  </g>
  
  <text x="44" y="22" class="text">RELABS</text>
</svg>
